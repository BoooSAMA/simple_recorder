name: simple_recorder
description: "Simple Recorder - 多平台直播音频录制工具"
publish_to: 'none'
version: 0.9.1+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # 核心库（多平台直播接口）
  simple_live_core:
    path: ../dart_simple_live/simple_live_core

  # 图标
  cupertino_icons: ^1.0.8

  # 框架、工具
  get: ^4.7.3
  dio: ^5.5.0+1
  hive: 2.2.3
  hive_flutter: 1.1.0
  logger: ^2.6.2
  intl: ^0.20.2
  dynamic_color: ^1.8.1
  path: any
  collection: any
  uuid: ^4.5.2
  crypto: ^3.0.7

  # Widget
  flutter_smart_dialog: ^4.9.8+9
  extended_image: ^10.0.1
  lottie: ^3.3.2

  # 系统交互
  package_info_plus: ^9.0.0
  device_info_plus: ^12.2.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  wakelock_plus: ^1.4.0
  file_picker: ^10.3.7
  connectivity_plus: ^7.0.0

  # 录音
  ffmpeg_kit_flutter_new_https_gpl: ^2.1.0
  open_filex: ^4.7.0

  flutter_localizations:
    sdk: flutter
  just_audio: ^0.10.6

dev_dependencies:
  flutter_lints: ^6.0.0
  build_runner: ^2.3.3
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "logo.png"
  macos:
    generate: true

flutter:
  uses-material-design: true
